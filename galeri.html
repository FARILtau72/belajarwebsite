<!DOCTYPE html>

<head>

    <title>Artikel</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            color: #333;
        }

        a { color: inherit; text-decoration: none; }

        .nav {
            background: #fff;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        }

        .nav-inner {
            max-width: 1100px;
            margin: 0 auto;
        }

        .brand { font-weight: 700; font-size: 18px; }

        .nav-links {
            text-align: right;
            font-size: 14px;
        }

        .nav-links a {
            padding: 6px 8px;
            border-radius: 6px;
            display: inline-block;
            margin-left: 8px;
        }

        .nav-links a:hover { background: #eef2ff; }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 16px 48px;
        }

        .title { margin: 0 0 10px; }
        .muted { color: #6b7280; }

        .item {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
        }

        .tag {
            display: inline-block;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 999px;
            background: #eef2ff;
            color: #4b6cb7;
            margin-bottom: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td {
            padding: 12px;
            vertical-align: top;
        }

        footer {
            text-align: center;
        }

        @media (max-width: 700px) {
            td { display: block; width: 100%; }
            .nav-links { text-align: left; padding-top: 8px; }
            .nav-links a { margin-left: 0; margin-right: 8px; }
        }
    </style>
</head>
