<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Web Sekolah</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background-color: #f0f0f0; margin: 20px; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 1100px;
            margin: auto;
        }

        /* Navigasi / Header Kecil Atas */
        .nav-header {
            grid-column: span 4;
            background-color: #ffb300;
            padding: 8px;
            display: flex;
            gap: 20px;
            font-weight: bold;
            border-radius: 4px;
        }
        .nav-header a { text-decoration: none; color: #333; }

        /* Area Foto Beranda (Biru Lebar) */
        .main-photo {
            grid-column: span 3;
            background-color: #2196f3;
            height: 200px;
            border-radius: 4px;
            overflow: hidden;
        }
        .main-photo img { width: 100%; height: 100%; object-fit: cover; }

        /* Area Profil/Login (Biru Kecil Kanan) */
        .side-profile {
            grid-column: span 1;
            background-color: #2196f3;
            color: white;
            padding: 15px;
            border-radius: 4px;
            text-align: center;
        }

        /* Baris Tengah (Tabel) */
        .table-section {
            grid-column: span 4;
            background-color: #ffb300;
            padding: 15px;
            border-radius: 4px;
        }
        table { width: 100%; border-collapse: collapse; background: white; }
        table, th, td { border: 1px solid #333; }
        th, td { padding: 8px; text-align: left; }

        /* Grid Galeri Bawah (Orange) */
        .gallery-box {
            background-color: #ffb300;
            height: 120px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .gallery-box img { width: 100%; height: 100%; object-fit: cover; }

    </style>
</head>
<body>

<div class="grid-container">
    <div class="nav-header">
        <a href="#">Beranda</a>
        <a href="#">Galeri</a>
        <a href="#">Profil</a>
    </div>

    <div class="main-photo">
        <img src="https://via.placeholder.com/800x200" alt="Foto Sekolah">
    </div>
    <div class="side-profile">
        <h4>Admin / Siswa</h4>
        <p>Selamat Datang!</p>
    </div>

    <div class="table-section">
        <h3>Data Siswa / Jadwal</h3>
        <table>
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Keterangan</th>
            </tr>
            <tr>
                <td>1</td>
                <td>Budi Santoso</td>
                <td>Hadir</td>
            </tr>
        </table>
    </div>

    <div class="gallery-box"><img src="https://via.placeholder.com/200" alt="Galeri 1"></div>
    <div class="gallery-box"><img src="https://via.placeholder.com/200" alt="Galeri 2"></div>
    <div class="gallery-box"><img src="https://via.placeholder.com/200" alt="Galeri 3"></div>
    <div class="gallery-box"><img src="https://via.placeholder.com/200" alt="Galeri 4"></div>
</div>

</body>
</html>
