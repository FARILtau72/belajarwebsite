<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabel Galeri - MyGallery</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #1f2937;
            padding: 20px;
        }

        .layout {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
            overflow: hidden;
        }

        .topbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 14px 16px;
            background: linear-gradient(to right, #4b6cb7, #182848);
        }

        .topbar a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 10px;
            border-radius: 6px;
        }

        .topbar a:hover { background: rgba(255, 255, 255, 0.18); }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #e5e7eb;
            padding: 12px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #f8fafc;
            font-size: 14px;
            color: #334155;
        }

        td img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            display: block;
        }

        .site-footer {
            text-align: center;
            padding: 16px;
            color: #4b5563;
            font-size: 14px;
            margin-top: auto;
        }

        @media (max-width: 760px) {
            body { padding: 10px; }
            th, td { font-size: 14px; }
            td img { height: 140px; }
        }
    </style>
</head>
<body>
    <section class="layout">
        <nav class="topbar">
            <a href="index.html">Home</a>
            <a href="hayu.html">Gallery</a>
            <a href="page.html">Profil</a>
            <a href="kontak.html">My Friends</a>
        </nav>

        <table>
            <thead>
                <tr>
                    <th>Judul</th>
                    <th>Preview 1</th>
                    <th>Preview 2</th>
                    <th>Preview 3</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Filosofi Foto Alam</td>
                    <td><img src="https://images.pexels.com/photos/4512766/pexels-photo-4512766.jpeg" alt="Preview 1"></td>
                    <td><img src="https://images.pexels.com/photos/11495792/pexels-photo-11495792.jpeg" alt="Preview 2"></td>
                    <td><img src="https://images.pexels.com/photos/11410645/pexels-photo-11410645.jpeg" alt="Preview 3"></td>
                </tr>
                <tr>
                    <td>Kopi dan Suasana</td>
                    <td><img src="https://images.pexels.com/photos/30985136/pexels-photo-30985136.jpeg" alt="Preview 4"></td>
                    <td><img src="img/kotol.jpg" alt="Preview 5"></td>
                    <td><img src="https://images.pexels.com/photos/4512766/pexels-photo-4512766.jpeg" alt="Preview 6"></td>
                </tr>
            </tbody>
        </table>
    </section>

    <footer class="site-footer">
        <p>&copy; 2026 MyGallery. All rights reserved.</p>
    </footer>
</body>
</html>
