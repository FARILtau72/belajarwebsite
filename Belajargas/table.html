<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajargas Table</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #1f2937;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
        }

        h1 {
            margin: 0 0 14px;
            text-align: center;
        }

        p {
            margin: 0 0 14px;
            line-height: 1.6;
            color: #4b5563;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 8px;
        }

        th, td {
            border: 1px solid #e5e7eb;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #eef2ff;
            color: #1e3a8a;
        }

        .home-link {
            display: inline-block;
            margin-top: 14px;
            color: #4b6cb7;
            font-weight: 600;
            text-decoration: none;
        }

        .site-footer {
            text-align: center;
            padding: 16px;
            color: #4b5563;
            font-size: 14px;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Belajargas Table</h1>
        <p>Contoh tabel yang lebih rapi untuk data sederhana.</p>

        <table>
            <thead>
                <tr>
                    <th>No</th>
                    <th>Kategori</th>
                    <th>Keterangan</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Galeri</td>
                    <td>Kumpulan foto dan filosofi singkat.</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Artikel</td>
                    <td>Catatan kecil seputar desain dan web.</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>Profil</td>
                    <td>Informasi diri dan skill utama.</td>
                </tr>
            </tbody>
        </table>

        <a class="home-link" href="../index.html">Kembali ke Home</a>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 MyGallery. All rights reserved.</p>
    </footer>
</body>
</html>
