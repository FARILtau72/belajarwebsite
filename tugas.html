<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my tabel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            color: #333;
        }

        table {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            border-collapse: collapse;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

       th, td {
            padding: 20px;
            vertical-align: bottom; 
            border: 1px solid #e0e0e0;
           }
        th {
            text-align: center;
            background: linear-gradient(to right, #4b6cb7, #182848);
            color: white;
            vertical-align: middle;
            font-weight: bold;
            position: relative;
        }

        th a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
            display: inline-block;
            margin: 0 5px;
        }

        th a:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        a {
            text-decoration: none;
            color: #4b6cb7;
            font-weight: bold;
            margin: 0 10px;
            font-size: 16px;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #182848;
        }

        img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            border-radius: 5px;
            transition: transform 0.3s ease;
        }

        img:hover {
            transform: scale(1.03);
        }

        .name-cell {
            font-size: 1.8em;
            font-weight: bold;
            text-align: center;
            vertical-align: middle;
            width: 25%;
            background: linear-gradient(to bottom, #f8f9fa, #e9ecef);
            color: #2c3e50;
        }

        h3 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 1.4em;
            border-bottom: 2px solid #4b6cb7;
            padding-bottom: 5px;
            display: inline-block;
        }

        p {
            line-height: 1.6;
            color: #555;
            font-size: 14px;
            margin-top: 10px;
        }

        .content-section {
            background-color: white;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        tfoot th {
            background: linear-gradient(to right, #3a7bd5, #00d2ff);
        }

        @media screen and (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            table {
                width: 100%;
            }
            
            th a {
                display: block;
                margin: 5px 0;
            }
            
            .name-cell {
                width: 100%;
                font-size: 1.5em;
            }
            
            td[rowspan] {
                display: table-row;
            }
        }
    </style>
</head>
<body>

    <table>
        <thead>
          
           </div>
        </thead>
        <tbody>
            <tr>
                <td colspan="2">
                    <img src="img/kotol.jpg" alt="Code Editor">
                </td>
                <td>
                    <img src="img/kotol.jpg" alt="Code Editor">
                   </td>
                <td>
                    <img src="img/kotol.jpg" alt="Code Editor">
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <img src="img/kotol.jpg" alt="Code Editor">
                </td>
                <td>
                        
                        <img src="img/kotol.jpg" alt="Code Editor">
                </td>
                <td>
                    <img src="img/kotol.jpg" alt="Code Editor">
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>
